apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-monitor
  namespace: event-monitor
  labels:
    app: event-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-monitor
  template:
    metadata:
      labels:
        app: event-monitor
    spec:
      containers:
      - name: event-monitor
        image: event-monitor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: event-monitor-config
              key: spring.profiles.active
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: event-monitor-config
              key: database.url
        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: event-monitor-config
              key: database.user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: event-monitor-secret
              key: database.password
        - name: WEB3J_CLIENT_ADDRESS
          valueFrom:
            secretKeyRef:
              name: event-monitor-secret
              key: infura.websocket.url
        - name: CONTRACT_ADDRESS
          valueFrom:
            secretKeyRef:
              name: event-monitor-secret
              key: contract.address
        - name: START_BLOCK
          value: "latest"
        - name: JAVA_OPTS
          value: "-Xmx768m -Xms512m"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
