apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: event-monitor-ingress
  namespace: event-monitor
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: event-monitor.local  # Change to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: event-monitor-service
            port:
              number: 8080
