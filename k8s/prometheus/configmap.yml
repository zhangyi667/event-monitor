apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: event-monitor
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape event-monitor application metrics
      - job_name: 'event-monitor'
        metrics_path: '/actuator/prometheus'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - event-monitor
        relabel_configs:
          # Only scrape pods with app=event-monitor label
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: event-monitor
          # Use pod name as instance label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          # Add pod IP
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: pod_ip
