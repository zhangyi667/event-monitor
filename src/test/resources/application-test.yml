spring:
  application:
    name: event-monitor-test

  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

web3j:
  client-address: ws://localhost:8545
  contract:
    address: "0x1234567890123456789012345678901234567890"
    start-block: "latest"

server:
  port: 0

logging:
  level:
    root: WARN
    com.web3.eventmonitor: INFO
