spring:
  application:
    name: event-monitor

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/eventmonitor}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

web3j:
  client-address: ${WEB3J_CLIENT_ADDRESS:wss://sepolia.infura.io/ws/v3/YOUR_PROJECT_ID}
  contract:
    address: ${CONTRACT_ADDRESS:0x1234567890123456789012345678901234567890}
    start-block: ${START_BLOCK:latest}

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.web3.eventmonitor: DEBUG
    org.web3j: INFO
    org.springframework.web: INFO
    org.hibernate: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
