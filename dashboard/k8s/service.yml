apiVersion: v1
kind: Service
metadata:
  name: event-monitor-dashboard-service
  namespace: event-monitor
  labels:
    app: event-monitor-dashboard
spec:
  type: NodePort
  selector:
    app: event-monitor-dashboard
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080
    protocol: TCP
    name: http
